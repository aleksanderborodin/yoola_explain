<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; width: 260px;
        margin: 0; padding: 14px; background: #14161b; color: #e8eaee; font-size: 13px; }
      h1 { font-size: 15px; margin: 0 0 8px; }
      button { width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid #3a3f4a;
        background: #262a33; color: #f5f6f8; cursor: pointer; font-size: 13px; }
      button:hover { background: #30343d; }
      p { color: #9aa1ad; margin: 8px 0 0; font-size: 12px; line-height: 1.4; }
    </style>
  </head>
  <body>
    <h1>Yoola</h1>
    <button id="summarize">Summarize this page</button>
    <p>Yoola detects legal pages automatically and summarizes only when you ask.
       AI summary — not legal advice.</p>
    <script src="popup.js"></script>
  </body>
</html>
