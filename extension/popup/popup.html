<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --paper: #F7F3EB; --card: #FFFFFF; --line: #E4DDCC;
        --ink: #201F1A; --ink2: #6F6A5D; --ink3: #9B9484;
        --brass: #8C6D1F; --brass-soft: #B8912F;
      }
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
        width: 268px; margin: 0; padding: 16px; background: var(--paper); color: var(--ink);
        -webkit-font-smoothing: antialiased;
      }
      .mark {
        font-family: "Iowan Old Style", Palatino, Georgia, serif;
        font-weight: 700; font-size: 19px; letter-spacing: .3px; color: var(--ink);
      }
      .mark::after { content: "."; color: var(--brass-soft); }
      .tagline { color: var(--ink2); font-size: 12px; margin: 4px 0 14px; line-height: 1.45; }
      button {
        width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--ink);
        background: var(--ink); color: var(--paper); cursor: pointer;
        font-size: 13.5px; font-weight: 600;
      }
      button:hover { background: #35332B; }
      .fine { color: var(--ink3); margin: 12px 0 0; font-size: 11px; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div class="mark">Yoola</div>
    <p class="tagline">A second opinion on the fine print — the alarming clauses first, each traceable to the source.</p>
    <button id="summarize">Summarize this page</button>
    <p class="fine">Detects legal pages automatically; only summarizes when you ask. AI summary — not legal advice.</p>
    <script src="popup.js"></script>
  </body>
</html>
