<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --paper: #F7F3EB; --card: #FFFFFF; --line: #E4DDCC;
        --ink: #201F1A; --ink2: #6F6A5D; --ink3: #9B9484;
        --brass: #8C6D1F; --brass-soft: #B8912F;
        --gA: #1F8A4C; --gB: #6E9A2B; --gC: #C7860D; --gD: #C75B1E; --gE: #C0392B;
      }
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
        width: 316px; margin: 0; padding: 14px 14px 12px; background: var(--paper); color: var(--ink);
        -webkit-font-smoothing: antialiased;
      }
      .mark {
        font-family: "Iowan Old Style", Palatino, Georgia, serif;
        font-weight: 700; font-size: 19px; letter-spacing: .3px; color: var(--ink);
      }
      .mark::after { content: "."; color: var(--brass-soft); }
      .host-line {
        color: var(--ink2); font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px;
        font-weight: 600; margin: 12px 0 8px;
      }
      .list { display: flex; flex-direction: column; gap: 7px; }
      .row {
        display: flex; align-items: center; gap: 11px; width: 100%; text-align: left;
        background: var(--card); border: 1px solid var(--line); border-radius: 10px;
        padding: 9px 11px; cursor: pointer; color: var(--ink); font: inherit;
      }
      .row:hover { border-color: var(--brass-soft); }
      .stamp {
        flex: none; width: 34px; height: 34px; border-radius: 50%;
        border: 2px solid currentColor; display: grid; place-items: center;
        transform: rotate(-6deg); position: relative;
        font-family: "Iowan Old Style", Palatino, Georgia, serif; font-weight: 700; font-size: 16px;
      }
      .stamp::before { content: ""; position: absolute; inset: 3px; border: 1px solid currentColor; border-radius: 50%; opacity: .5; }
      .stamp.new { color: var(--ink3); border-style: dashed; }
      .stamp.new::before { display: none; }
      .stamp.known { color: var(--brass); }
      .g-A { color: var(--gA); } .g-B { color: var(--gB); } .g-C { color: var(--gC); }
      .g-D { color: var(--gD); } .g-E { color: var(--gE); }
      .row-label { font-weight: 600; font-size: 12.5px; line-height: 1.3; word-break: break-word; }
      .row-sub { color: var(--ink3); font-size: 11px; margin-top: 1px; }
      .muted { color: var(--ink2); font-size: 12px; line-height: 1.5; padding: 2px 1px; }
      button.page {
        width: 100%; margin-top: 11px; padding: 9px; border-radius: 10px;
        border: 1px solid var(--ink); background: var(--ink); color: var(--paper);
        cursor: pointer; font-size: 13px; font-weight: 600;
      }
      button.page:hover { background: #35332B; }
      button.page:disabled { background: var(--ink3); border-color: var(--ink3); cursor: default; }
      .fine { color: var(--ink3); margin: 10px 0 0; font-size: 10.5px; line-height: 1.45; }
    </style>
  </head>
  <body>
    <div class="mark">Yoola</div>
    <div class="host-line" id="host-line">This site's agreements</div>
    <div class="list" id="list"><div class="muted">Looking around…</div></div>
    <button class="page" id="summarize">Summarize this page instead</button>
    <p class="fine" id="fine">Graded entries open instantly from the shared cache; the rest are analyzed on request. AI summaries — not legal advice.</p>
    <script src="popup.js"></script>
  </body>
</html>
